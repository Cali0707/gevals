kind: Eval
metadata:
  name: "llm-agent-kubernetes-test"
config:
  # Inline agent configuration - no separate agent.yaml file needed
  agent:
    type: "builtin.llm-agent"
    model: "openai:mistral-small-24b-w8a8"  # Change to your provider:model
  # Before running, set the provider-specific environment variable:
  #   export OPENAI_API_KEY="sk-..."
  mcpConfigFile: ../mcp-config.yaml
  llmJudge:
    env:
      baseUrlKey: JUDGE_BASE_URL
      apiKeyKey: JUDGE_API_KEY
      modelNameKey: JUDGE_MODEL_NAME
  taskSets:
    - glob: ../tasks/*/*.yaml
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
